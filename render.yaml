services:
  - type: web
    name: alphaai-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AlphaAI API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: http://localhost:3000