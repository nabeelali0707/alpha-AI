version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example
      - POSTGRES_DB=postgres
      - SUPABASE_URL=
      - SUPABASE_SERVICE_ROLE=
      - NEXT_PUBLIC_ALPHAAI_API_BASE_URL=http://backend:8001/api/v1
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
      - ./supabase/tables.sql:/app/supabase/tables.sql

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_ALPHAAI_API_BASE_URL=http://backend:8001/api/v1
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/app

volumes:
  db_data:
