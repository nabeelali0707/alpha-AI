version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example
      - POSTGRES_DB=postgres
      - SUPABASE_URL=
      - SUPABASE_SERVICE_ROLE=
      - NEXT_PUBLIC_ALPHAAI_API_BASE_URL=http://backend:8001/api/v1
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./supabase/tables.sql:/app/supabase/tables.sql

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_ALPHAAI_API_BASE_URL=http://backend:8001/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  db_data:
